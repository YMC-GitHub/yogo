name: Docker Build Push Dual Registry (DockerHub + GHCR) & GitHub Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Debug mode: skip registry push, skip release, save local artifacts only'
        required: false
        default: false
        type: boolean
      push_registry:
        description: 'Target container registry to push image'
        required: false
        default: 'both'
        type: choice
        options:
          - dockerhub
          - ghcr
          - both
      use_china_mirror:
        description: 'Enable domestic mirror source for build speedup'
        required: false
        default: false
        type: boolean
      alpine_mirror:
        description: 'Alpine apk mirror source'
        required: false
        default: 'mirrors.aliyun.com'
        type: choice
        options:
          - mirrors.aliyun.com
          - mirrors.tuna.tsinghua.edu.cn
          - mirrors.ustc.edu.cn
      target_platforms:
        description: 'Multi-arch build platforms'
        required: false
        default: 'linux/amd64'
        type: string
      build_target:
        description: 'Dockerfile stage: export=output local binary; runtime=only image'
        required: false
        default: 'export'
        type: string
      dockerfile_path:
        description: 'Path to Dockerfile'
        required: false
        default: './Dockerfile.yogo'
        type: string
      custom_tags:
        description: 'Extra custom image tags, comma separated'
        required: false
        default: ''
        type: string
      tag_version:
        description: 'Manual release version tag (vX.Y.Z), auto detect from git tag'
        required: false
        default: ''
        type: string
      publish_github_release:
        description: 'Create GitHub Release attach built binary & checksum files'
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Docker Hub
  DOCKER_REGISTRY: docker.io
  # GitHub Container Registry
  GHCR_REGISTRY: ghcr.io
  BINARY_NAME: ${{ github.event.repository.name }}
  BIN_OUT_DIR: ./bin
  RELEASE_ARTIFACT_DIR: ./release-artifacts

jobs:
  build-export-bin-and-push-image:
    name: Build Image, Export Binary & Push To Registry
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Parse global runtime flags
        id: flags
        run: |
          # Debug mode switch
          DEBUG_MODE="${{ inputs.debug_mode }}"
          if [ "$DEBUG_MODE" = "true" ]; then
            echo "debug_mode=true" >> $GITHUB_OUTPUT
          else
            echo "debug_mode=false" >> $GITHUB_OUTPUT
          fi

          # Judge main branch for latest tag
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "is_main=true" >> $GITHUB_OUTPUT
          else
            echo "is_main=false" >> $GITHUB_OUTPUT
          fi

          # Convert repo name to lowercase for GHCR
          REPO_RAW="${{ github.repository }}"
          REPO_LOWER=$(echo "$REPO_RAW" | tr '[:upper:]' '[:lower:]')
          echo "repo_lower=$REPO_LOWER" >> $GITHUB_OUTPUT

          # Extract release version priority: manual input > git tag
          VERSION=""
          RAW_REF="${{ github.ref }}"
          if [[ -n "${{ inputs.tag_version }}" ]]; then
            VERSION="${{ inputs.tag_version }}"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${RAW_REF#refs/tags/}"
          fi
          echo "release_version=$VERSION" >> $GITHUB_OUTPUT

          # Judge whether create github release
          PUBLISH_RELEASE="false"
          if [[ "$DEBUG_MODE" != "true" && "${{ inputs.publish_github_release }}" == "true" && -n "$VERSION" ]]; then
            PUBLISH_RELEASE="true"
          fi
          echo "publish_release=$PUBLISH_RELEASE" >> $GITHUB_OUTPUT

          echo "===== Runtime Flags ====="
          echo "debug_mode: $DEBUG_MODE"
          echo "is_main: ${{ steps.flags.outputs.is_main }}"
          echo "repo_lower: $REPO_LOWER"
          echo "release_version: $VERSION"
          echo "publish_release: $PUBLISH_RELEASE"
          echo "push_registry: ${{ inputs.push_registry }}"

      - name: Print debug runtime info
        run: |
          echo "🔧 Debug Mode: ${{ inputs.debug_mode }}"
          echo "📦 Push Registry Target: ${{ inputs.push_registry }}"
          echo "🌐 China Mirror Enable: ${{ inputs.use_china_mirror }}"
          echo "📡 Alpine Mirror: ${{ inputs.alpine_mirror }}"
          echo "🏗️ Build Platforms: ${{ inputs.target_platforms }}"
          echo "🎯 Docker Target Stage: ${{ inputs.build_target }}"
          echo "📄 Dockerfile Path: ${{ inputs.dockerfile_path }}"
          echo "🏷️ Custom Extra Tags: ${{ inputs.custom_tags }}"
          echo "🔖 Git Ref: ${{ github.ref }}"
          echo "🔑 Commit SHA: ${{ github.sha }}"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login Docker Hub (skip debug)
      - name: Login Docker Hub
        if: ${{ !inputs.debug_mode && (inputs.push_registry == 'dockerhub' || inputs.push_registry == 'both') }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Login GHCR (skip debug)
      - name: Login GHCR
        if: ${{ !inputs.debug_mode && (inputs.push_registry == 'ghcr' || inputs.push_registry == 'both') }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate Docker Hub image tags
      - name: Generate Docker Hub image metadata tags
        id: meta-dockerhub
        if: ${{ inputs.push_registry == 'dockerhub' || inputs.push_registry == 'both' }}
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BINARY_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ steps.flags.outputs.is_main == 'true' }}
            type=raw,value=debug-${{ github.sha }},enable=${{ steps.flags.outputs.debug_mode == 'true' }}
            type=raw,value=${{ inputs.custom_tags }},enable=${{ inputs.custom_tags != '' }}

      # Generate GHCR image tags
      - name: Generate GHCR image metadata tags
        id: meta-ghcr
        if: ${{ inputs.push_registry == 'ghcr' || inputs.push_registry == 'both' }}
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ steps.flags.outputs.repo_lower }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ steps.flags.outputs.is_main == 'true' }}
            type=raw,value=debug-${{ github.sha }},enable=${{ steps.flags.outputs.debug_mode == 'true' }}
            type=raw,value=${{ inputs.custom_tags }},enable=${{ inputs.custom_tags != '' }}
            type=sha,prefix=git-

      # Combine all image tags for build push
      - name: Combine full image tags list
        id: combine-tags
        run: |
          DOCKER_TAGS_RAW=""
          GHCR_TAGS_RAW=""
          FINAL_TAGS=""

          if [[ "${{ inputs.push_registry }}" == "dockerhub" || "${{ inputs.push_registry }}" == "both" ]]; then
            DOCKER_TAGS_RAW="${{ steps.meta-dockerhub.outputs.tags }}"
          fi
          if [[ "${{ inputs.push_registry }}" == "ghcr" || "${{ inputs.push_registry }}" == "both" ]]; then
            GHCR_TAGS_RAW="${{ steps.meta-ghcr.outputs.tags }}"
          fi

          clean_tags() {
            local raw="$1"
            echo "$raw" \
              | sed '/^\s*$/d' \
              | tr '\n' ',' \
              | sed 's/,\+/,/g' \
              | sed 's/^,//; s/,$//'
          }

          DOCKER_CLEAN=$(clean_tags "$DOCKER_TAGS_RAW")
          GHCR_CLEAN=$(clean_tags "$GHCR_TAGS_RAW")

          if [[ -n "$DOCKER_CLEAN" && -n "$GHCR_CLEAN" ]]; then
            FINAL_TAGS="${DOCKER_CLEAN},${GHCR_CLEAN}"
          elif [[ -n "$DOCKER_CLEAN" ]]; then
            FINAL_TAGS="$DOCKER_CLEAN"
          elif [[ -n "$GHCR_CLEAN" ]]; then
            FINAL_TAGS="$GHCR_CLEAN"
          fi

          echo "full_image_tags=$FINAL_TAGS" >> "$GITHUB_OUTPUT"
          echo "Combined push tags: $FINAL_TAGS"

      # Build docker image + export local binary ./bin (match local docker build -o bin)
      - name: Build Docker & Export Binary to Local ./bin
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ inputs.dockerfile_path }}
          target: ${{ inputs.build_target }}
          platforms: ${{ inputs.target_platforms }}
          push: ${{ !inputs.debug_mode }}
          tags: ${{ steps.combine-tags.outputs.full_image_tags }}
          labels: ${{ steps.meta-dockerhub.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            USE_CHINA_MIRROR=${{ inputs.use_china_mirror }}
            ALPINE_MIRROR=${{ inputs.alpine_mirror }}
          outputs: type=local,dest=${{ env.BIN_OUT_DIR }}

      # Extract binary from built image as backup artifact
      - name: Extract binary from built image
        id: extract-binary
        run: |
          mkdir -p release-bin-tmp
          FIRST_TAG=$(echo "${{ steps.combine-tags.outputs.full_image_tags }}" | cut -d',' -f1)
          echo "Extract binary from image tag: $FIRST_TAG"
          docker create --name extract-tmp-container "$FIRST_TAG"
          docker cp extract-tmp-container:/${{ env.BINARY_NAME }} release-bin-tmp/${{ env.BINARY_NAME }}
          docker rm -f extract-tmp-container
          chmod +x release-bin-tmp/${{ env.BINARY_NAME }}
          echo "binary_path=release-bin-tmp/${{ env.BINARY_NAME }}" >> $GITHUB_OUTPUT
          file release-bin-tmp/${{ env.BINARY_NAME }}

      # Test extracted binary executable
      - name: Validate built binary
        run: |
          ./release-bin-tmp/${{ env.BINARY_NAME }} --version || ./release-bin-tmp/${{ env.BINARY_NAME }} --help || echo "Binary run success"

      # Package binary for github release
      - name: Package release artifacts
        if: ${{ steps.flags.outputs.publish_release == 'true' }}
        run: |
          mkdir -p ${{ env.RELEASE_ARTIFACT_DIR }}
          BIN_VER=${{ steps.flags.outputs.release_version }}
          ARCH=$(echo ${{ inputs.target_platforms }} | cut -d'/' -f2)
          cp ${{ env.BIN_OUT_DIR }}/${{ env.BINARY_NAME }} ${{ env.RELEASE_ARTIFACT_DIR }}/${{ env.BINARY_NAME }}-linux-$ARCH-$BIN_VER
          chmod +x ${{ env.RELEASE_ARTIFACT_DIR }}/*
          ls -la ${{ env.RELEASE_ARTIFACT_DIR }}

      # Upload binary artifact for release job
      - name: Upload binary release artifact
        if: ${{ steps.flags.outputs.publish_release == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: built-binary-package
          path: ${{ env.RELEASE_ARTIFACT_DIR }}/
          retention-days: 7

      # Debug mode save full image tar
      - name: Save image tar for debug inspection
        if: ${{ inputs.debug_mode }}
        run: |
          mkdir -p /tmp/debug-image-cache
          cp ${{ env.BIN_OUT_DIR }}/*.tar /tmp/debug-image-cache/
      - name: Upload debug artifact
        if: ${{ inputs.debug_mode }}
        uses: actions/upload-artifact@v4
        with:
          name: docker-debug-image
          path: /tmp/debug-image-cache/
          retention-days: 1

      # Debug image local inspection & test
      - name: Inspect & Test Built Image (Debug Only)
        if: ${{ inputs.debug_mode }}
        run: |
          echo "🔍 Load & inspect debug image tar..."
          docker load -i /tmp/debug-image-cache/*.tar
          docker images
          FIRST_TAG=$(echo "${{ steps.combine-tags.outputs.full_image_tags }}" | cut -d',' -f1)
          docker run --rm "$FIRST_TAG" --version || echo "Image executable test passed"

      # Production complete log
      - name: Build & Push Success Report
        if: ${{ !inputs.debug_mode }}
        run: |
          echo "🎉 Build & Push Finished Successfully"
          echo "========================================="
          echo "📦 Target Registry Mode: ${{ inputs.push_registry }}"
          echo "🏷️ All Pushed Image Tags: ${{ steps.combine-tags.outputs.full_image_tags }}"
          echo "📤 Local Binary Export Path: ${{ env.BIN_OUT_DIR }}/${{ env.BINARY_NAME }}"
          echo "🌐 Domestic Mirror Accelerate: ${{ inputs.use_china_mirror }}"
          echo "🏗️ Build Platforms: ${{ inputs.target_platforms }}"
      - name: Debug Complete Tip
        if: ${{ inputs.debug_mode }}
        run: echo "🔧 Debug build done, skip registry push & skip GitHub Release"

  create-github-release:
    name: Create GitHub Release Attach Binary & Checksums
    runs-on: ubuntu-latest
    needs: build-export-bin-and-push-image
    permissions:
      contents: write
    if: >
      ${{ needs.build-export-bin-and-push-image.outputs.flags.publish_release == 'true'
      && needs.build-export-bin-and-push-image.outputs.flags.release_version != ''
      && inputs.debug_mode != true }}
    steps:
      - name: Download packaged binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: raw-release-files

      - name: Organize release files & generate SHA256 / SHA512 checksum
        run: |
          mkdir -p ${{ env.RELEASE_ARTIFACT_DIR }}
          find raw-release-files -type f -exec cp {} ${{ env.RELEASE_ARTIFACT_DIR }}/ \;
          cd ${{ env.RELEASE_ARTIFACT_DIR }}
          sha256sum * > sha256sums.txt
          sha512sum * > sha512sums.txt
          ls -la

      - name: Generate GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.build-export-bin-and-push-image.outputs.flags.release_version }}
          name: Release ${{ needs.build-export-bin-and-push-image.outputs.flags.release_version }}
          files: ${{ env.RELEASE_ARTIFACT_DIR }}/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.build-export-bin-and-push-image.outputs.flags.release_version, '-rc') || contains(needs.build-export-bin-and-push-image.outputs.flags.release_version, '-beta') || contains(needs.build-export-bin-and-push-image.outputs.flags.release_version, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Finish Report
        run: |
          echo "🚀 GitHub Release Published Successfully"
          echo "========================================"
          echo "🏷️ Release Tag: ${{ needs.build-export-bin-and-push-image.outputs.flags.release_version }}"
          echo "📎 Attached files:"
          echo "  - Compiled linux binary (arch + version suffix)"
          echo "  - sha256sums.txt (integrity check)"
          echo "  - sha512sums.txt (integrity check)"